theme = "nightfox"
[editor]
true-color = true
bufferline = "always"
line-number = "relative"
scroll-lines = 1
gutters = ["diagnostics", "spacer", "line-numbers", "spacer", "diff"]
[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"
[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
backspace = ["move_next_word_end", "move_prev_word_end", "move_next_word_end", "delete_selection_noyank"]
D = ["ensure_selections_forward", "extend_to_line_end", "delete_selection"]
X = "extend_line_above"
C-x = ["ensure_selections_forward", "extend_to_line_end"]
[keys.insert]
C-o = ["open_above"]
C-a = ["goto_line_start"]
C-e = ["goto_line_end_newline"]
C-b = ["move_char_left"]
C-f = ["move_char_right"]
